<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Casino Royale Neon</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>

:root{
--red:#ff2d2d;
--pink:#ff0055;
--rose:#ff3366;
--purple:#9c27b0;
--violet:#7b1fa2;
--deep:#5e35b1;
--glass:rgba(255,255,255,.08);
--border:rgba(255,255,255,.15);
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,sans-serif;
}

body{
background:#05050b;
color:white;
overflow-x:hidden;
min-height:100vh;
}

body::before{
content:"";
position:fixed;
inset:0;
background:
radial-gradient(circle at 10% 20%, rgba(255,0,85,.2), transparent 35%),
radial-gradient(circle at 90% 20%, rgba(156,39,176,.2), transparent 35%),
radial-gradient(circle at 50% 90%, rgba(255,45,45,.15), transparent 40%),
#05050b;
z-index:-10;
}

.cursor{
position:fixed;
width:280px;
height:280px;
border-radius:50%;
pointer-events:none;
background:
radial-gradient(circle,
rgba(255,0,120,.25),
transparent 70%);
filter:blur(40px);
z-index:2;
}

.orb{
position:fixed;
border-radius:50%;
filter:blur(90px);
opacity:.4;
z-index:-5;
}

.o1{
width:500px;
height:500px;
background:#ff0055;
left:-150px;
top:-150px;
}

.o2{
width:400px;
height:400px;
background:#9c27b0;
right:-120px;
top:30%;
}

.wrapper{
max-width:1300px;
margin:auto;
padding:40px 20px;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:30px;
}

.logo{
font-size:2rem;
font-weight:900;
background:linear-gradient(135deg,#ff2d2d,#9c27b0);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.balance{
padding:14px 24px;
border-radius:20px;
background:var(--glass);
border:1px solid var(--border);
backdrop-filter:blur(30px);
font-weight:700;
}

.games{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(340px,1fr));
gap:24px;
}

.card{
background:var(--glass);
backdrop-filter:blur(30px);
border:1px solid var(--border);
border-radius:30px;
padding:24px;
box-shadow:0 10px 40px rgba(0,0,0,.3);
transition:.35s;
}

.card:hover{
transform:translateY(-8px);
}

.title{
font-size:1.5rem;
font-weight:800;
margin-bottom:20px;
}

.slot-machine{
display:flex;
justify-content:center;
gap:10px;
margin:25px 0;
}

.reel{
width:90px;
height:90px;
display:flex;
align-items:center;
justify-content:center;
font-size:3rem;
border-radius:20px;
background:rgba(255,255,255,.08);
border:1px solid rgba(255,255,255,.1);
}

.controls{
display:flex;
gap:10px;
margin-top:15px;
}

input{
flex:1;
padding:14px;
border:none;
outline:none;
border-radius:16px;
background:rgba(255,255,255,.08);
color:white;
}

button{
padding:14px 18px;
border:none;
border-radius:16px;
cursor:pointer;
font-weight:700;
color:white;
background:linear-gradient(135deg,#ff0055,#9c27b0);
transition:.3s;
}

button:hover{
transform:scale(1.05);
box-shadow:
0 0 10px currentColor,
0 0 20px currentColor,
0 0 40px currentColor;
}

.result{
margin-top:15px;
opacity:.85;
min-height:24px;
}

.coin{
width:130px;
height:130px;
margin:20px auto;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:2rem;
font-weight:900;
background:
linear-gradient(135deg,#ffd700,#ffb300);
color:#222;
transition:.8s;
transform-style:preserve-3d;
}

.coin.flip{
transform:rotateY(1080deg);
}

.dice{
font-size:5rem;
text-align:center;
margin:15px 0;
}

.stats{
margin-top:30px;
display:grid;
grid-template-columns:repeat(3,1fr);
gap:16px;
}

.stat{
padding:18px;
text-align:center;
border-radius:20px;
background:rgba(255,255,255,.06);
}

.stat h3{
font-size:1.8rem;
margin-bottom:8px;
}

footer{
margin-top:40px;
text-align:center;
opacity:.6;
}

</style>
</head>
<body>

<div class="cursor"></div>

<div class="orb o1"></div>
<div class="orb o2"></div>

<div class="wrapper">

<header>
<div class="logo">CASINO ROYALE</div>
<div class="balance">💰 Баланс: $<span id="balance">1000</span></div>
</header>

<div class="games">

<!-- SLOT -->

<div class="card">

<div class="title">🎰 Слоты</div>

<div class="slot-machine">
<div class="reel" id="r1">🍒</div>
<div class="reel" id="r2">💎</div>
<div class="reel" id="r3">🍋</div>
</div>

<div class="controls">
<input type="number" id="slotBet" value="50">
<button onclick="spin()">Крутить</button>
</div>

<div class="result" id="slotResult"></div>

</div>

<!-- COIN -->

<div class="card">

<div class="title">🪙 Орёл / Решка</div>

<div class="coin" id="coin">?</div>

<div class="controls">
<button onclick="flipCoin('Орёл')">Орёл</button>
<button onclick="flipCoin('Решка')">Решка</button>
</div>

<div class="result" id="coinResult"></div>

</div>

<!-- DICE -->

<div class="card">

<div class="title">🎲 Dice</div>

<div class="dice" id="dice">🎲</div>

<div class="controls">
<input type="number" id="diceBet" value="25">
<button onclick="rollDice()">Бросить</button>
</div>

<div class="result" id="diceResult"></div>

</div>

</div>

<div class="stats">

<div class="stat">
<h3 id="wins">0</h3>
Побед
</div>

<div class="stat">
<h3 id="losses">0</h3>
Поражений
</div>

<div class="stat">
<h3 id="gamesCount">0</h3>
Игр
</div>

</div>

<footer>
Casino Royale Neon Demo • HTML/CSS/JS Only
</footer>

</div>

<script>

let balance=1000;
let wins=0;
let losses=0;
let games=0;

const symbols=[
"🍒",
"🍋",
"💎",
"⭐",
"7️⃣",
"🍇"
];

function update(){

balance=Math.max(0,balance);

document.getElementById("balance").textContent=balance;
document.getElementById("wins").textContent=wins;
document.getElementById("losses").textContent=losses;
document.getElementById("gamesCount").textContent=games;

}

function win(amount){
balance+=amount;
wins++;
games++;
update();
}

function lose(amount){
balance-=amount;
losses++;
games++;
update();
}

function randomSymbol(){
return symbols[Math.floor(Math.random()*symbols.length)];
}

/* SLOT */

function spin(){

const bet=parseInt(
document.getElementById("slotBet").value
)||0;

if(bet<=0||bet>balance)return;

let count=0;

const interval=setInterval(()=>{

document.getElementById("r1").textContent=randomSymbol();
document.getElementById("r2").textContent=randomSymbol();
document.getElementById("r3").textContent=randomSymbol();

count++;

if(count>18){

clearInterval(interval);

const a=randomSymbol();
const b=randomSymbol();
const c=randomSymbol();

r1.textContent=a;
r2.textContent=b;
r3.textContent=c;

if(a===b && b===c){

const reward=bet*5;

win(reward);

slotResult.innerHTML=
`🔥 Джекпот +$${reward}`;

}else{

lose(bet);

slotResult.innerHTML=
`😢 Потеряно $${bet}`;

}

}

},80);

}

/* COIN */

function flipCoin(choice){

const coin=
document.getElementById("coin");

coin.classList.add("flip");

setTimeout(()=>{

coin.classList.remove("flip");

const result=
Math.random()>0.5
?"Орёл"
:"Решка";

coin.innerHTML=
result==="Орёл"
?"🦅"
:"👑";

if(result===choice){

win(100);

coinResult.innerHTML=
"🎉 Вы угадали +$100";

}else{

lose(50);

coinResult.innerHTML=
"❌ Не угадали -$50";

}

},800);

}

/* DICE */

function rollDice(){

const bet=parseInt(
document.getElementById("diceBet").value
)||0;

if(bet<=0||bet>balance)return;

const value=
Math.floor(Math.random()*6)+1;

dice.innerHTML=value;

if(value>=5){

win(bet*2);

diceResult.innerHTML=
`🔥 Выпало ${value}. Выигрыш $${bet*2}`;

}else{

lose(bet);

diceResult.innerHTML=
`😢 Выпало ${value}. Потеря $${bet}`;

}

}

/* CURSOR */

const cursor=
document.querySelector(".cursor");

let mx=0;
let my=0;

let cx=0;
let cy=0;

window.addEventListener("mousemove",e=>{

mx=e.clientX;
my=e.clientY;

});

function animate(){

cx+=(mx-cx)*0.08;
cy+=(my-cy)*0.08;

cursor.style.transform=
`translate(${cx-140}px,${cy-140}px)`;

requestAnimationFrame(animate);

}

animate();

/* FLOATING ORBS */

const o1=document.querySelector(".o1");
const o2=document.querySelector(".o2");

function bg(t){

o1.style.transform=
`translate(${Math.sin(t/2500)*60}px,
${Math.cos(t/2000)*40}px)`;

o2.style.transform=
`translate(${Math.cos(t/3000)*50}px,
${Math.sin(t/2500)*70}px)`;

requestAnimationFrame(bg);

}

requestAnimationFrame(bg);

update();

</script>

</body>
</html>
