<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OneUI 9 Concept Preview</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>

:root{

--red:#ff2d2d;
--pink:#ff0055;
--rose:#ff3366;
--magenta:#d81b60;
--purple:#9c27b0;
--violet:#7b1fa2;
--deep:#5e35b1;

--glass:rgba(255,255,255,.08);
--glass-border:rgba(255,255,255,.15);

}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html,body{
width:100%;
height:100%;
overflow:hidden;
font-family:Inter,sans-serif;
background:#05050c;
color:white;
}

body{

background:
radial-gradient(circle at 10% 20%, rgba(255,0,85,.18), transparent 35%),
radial-gradient(circle at 80% 15%, rgba(156,39,176,.20), transparent 35%),
radial-gradient(circle at 50% 90%, rgba(255,45,45,.16), transparent 40%),
#05050c;

}

/* ===========================
CURSOR GLOW
=========================== */

.cursor{
position:fixed;
width:320px;
height:320px;
border-radius:50%;
pointer-events:none;
z-index:2;

background:
radial-gradient(circle,
rgba(255,0,100,.18),
rgba(255,0,255,.08),
transparent 70%);

filter:blur(50px);
}

/* ===========================
BACKGROUND
=========================== */

.bg{
position:fixed;
inset:0;
overflow:hidden;
z-index:-2;
}

.orb{
position:absolute;
border-radius:50%;
filter:blur(80px);
mix-blend-mode:screen;
opacity:.5;
will-change:transform;
}

.orb1{
width:650px;
height:650px;
background:#ff0055;
left:-180px;
top:-150px;
}

.orb2{
width:500px;
height:500px;
background:#9c27b0;
right:-100px;
top:20%;
}

.orb3{
width:450px;
height:450px;
background:#ff3366;
bottom:-150px;
left:25%;
}

.glass-shape{
position:absolute;
border-radius:40px;

background:rgba(255,255,255,.05);

border:1px solid rgba(255,255,255,.08);

backdrop-filter:blur(20px);
}

.shape1{
width:220px;
height:220px;

top:18%;
left:70%;

transform:rotate(30deg);
}

.shape2{
width:180px;
height:180px;

bottom:15%;
left:12%;

border-radius:50%;
}

.particles{
position:absolute;
inset:0;
}

.particle{

position:absolute;
width:3px;
height:3px;
border-radius:50%;

background:white;

opacity:.25;
}

/* ===========================
LAYOUT
=========================== */

.wrapper{

height:100vh;

display:flex;
justify-content:center;
align-items:center;

perspective:2200px;

}

.phone{

width:390px;
height:820px;

border-radius:48px;

position:relative;

background:
linear-gradient(
180deg,
rgba(255,255,255,.12),
rgba(255,255,255,.05)
);

border:1px solid rgba(255,255,255,.14);

backdrop-filter:blur(40px);

box-shadow:
0 50px 120px rgba(0,0,0,.55),
0 0 80px rgba(156,39,176,.18);

overflow:hidden;

transform-style:preserve-3d;

}

/* ===========================
REFLECTION
=========================== */

.phone::before{

content:"";

position:absolute;

top:-40%;
left:-40%;

width:80%;
height:160%;

background:
linear-gradient(
90deg,
transparent,
rgba(255,255,255,.12),
transparent
);

transform:rotate(25deg);

pointer-events:none;

}

/* ===========================
SCREEN
=========================== */

.screen{

position:absolute;
inset:0;

overflow:hidden;

background:
linear-gradient(
180deg,
rgba(255,255,255,.02),
rgba(255,255,255,.01)
);

}

/* ===========================
DYNAMIC ISLAND
=========================== */

.island{

position:absolute;

top:12px;
left:50%;

transform:translateX(-50%);

width:128px;
height:34px;

background:black;

border-radius:30px;

z-index:50;

display:flex;
align-items:center;
justify-content:center;

transition:.4s;
}

.island-dot{

width:10px;
height:10px;
border-radius:50%;

background:#00ff95;

box-shadow:
0 0 8px #00ff95,
0 0 20px #00ff95;

animation:pulse 2s infinite;
}

/* ===========================
LOCK SCREEN
=========================== */

.lock-screen{

position:absolute;
inset:0;

display:flex;
flex-direction:column;

align-items:center;
justify-content:flex-start;

padding-top:90px;

transition:.9s cubic-bezier(.2,.9,.2,1);

}

.time{

font-size:5rem;
font-weight:200;
letter-spacing:-4px;

}

.date{

opacity:.7;
margin-top:-10px;
}

.weather{

margin-top:40px;

padding:16px 22px;

background:var(--glass);

border:1px solid var(--glass-border);

backdrop-filter:blur(30px);

border-radius:24px;
}

.weather-row{
display:flex;
gap:12px;
align-items:center;
}

.weather-icon{
font-size:2rem;
}

.weather-temp{
font-size:1.5rem;
font-weight:700;
}

.ai-orb{

margin-top:80px;

width:180px;
height:180px;

border-radius:50%;

background:
radial-gradient(circle at 30% 30%,
#ff2d2d,
#ff0055,
#9c27b0,
#5e35b1);

filter:blur(.2px);

position:relative;

box-shadow:
0 0 30px #ff0055,
0 0 60px #ff0055,
0 0 100px rgba(255,0,85,.4);

animation:orbFloat 5s ease-in-out infinite;
}

.ai-orb::before{

content:"";

position:absolute;
inset:-15px;

border-radius:50%;

border:1px solid rgba(255,255,255,.2);

animation:spin 18s linear infinite;

}

.ai-orb::after{

content:"";

position:absolute;
inset:-35px;

border-radius:50%;

border:1px solid rgba(255,255,255,.08);

animation:spin 25s linear infinite reverse;

}

.unlock-text{

position:absolute;

bottom:80px;

font-size:.9rem;

opacity:.65;

animation:blink 2s infinite;
}

.home-indicator{

position:absolute;

bottom:14px;
left:50%;

transform:translateX(-50%);

width:120px;
height:5px;

border-radius:10px;

background:rgba(255,255,255,.8);

}

/* ===========================
HOME SCREEN
=========================== */

.home-screen{

position:absolute;
inset:0;

padding-top:70px;

opacity:0;

pointer-events:none;

transform:translateY(50px);

transition:.8s cubic-bezier(.2,.9,.2,1);

}

.home-screen.active{

opacity:1;
transform:none;
pointer-events:auto;

}

.status{

display:flex;
justify-content:space-between;

padding:0 24px;
font-size:.85rem;
}

.widgets{

padding:20px;
display:grid;
gap:16px;
}

.widget{

background:var(--glass);

border:1px solid var(--glass-border);

backdrop-filter:blur(30px);

border-radius:28px;

padding:18px;

box-shadow:
0 10px 40px rgba(0,0,0,.25);

}

.ai-widget{

height:140px;

display:flex;
flex-direction:column;
justify-content:center;

background:
linear-gradient(
135deg,
rgba(255,0,85,.18),
rgba(156,39,176,.18)
);

}

.ai-title{

font-size:1.2rem;
font-weight:700;
}

.ai-sub{

opacity:.7;
margin-top:6px;
font-size:.9rem;
}

.apps{

padding:10px 20px 0;

display:grid;

grid-template-columns:
repeat(4,1fr);

gap:18px;
}

.app{

display:flex;
flex-direction:column;
align-items:center;
gap:8px;

cursor:pointer;

transition:.35s;
}

.app:hover{
transform:translateY(-6px);
}

.icon{

width:62px;
height:62px;

border-radius:22px;

background:rgba(255,255,255,.08);

border:1px solid rgba(255,255,255,.15);

backdrop-filter:blur(25px);

display:flex;
align-items:center;
justify-content:center;

font-size:1.4rem;

box-shadow:
0 0 20px rgba(255,255,255,.08);

}

.label{
font-size:.72rem;
opacity:.85;
}

/* ===========================
NOTIFICATION
=========================== */

.notification{

position:absolute;

left:16px;
right:16px;

top:70px;

padding:14px 18px;

border-radius:22px;

background:rgba(255,255,255,.1);

backdrop-filter:blur(30px);

border:1px solid rgba(255,255,255,.15);

transform:translateY(-120px);

transition:.7s;
}

.notification.show{
transform:none;
}

/* ===========================
ANIMATION
=========================== */

@keyframes pulse{

50%{
transform:scale(1.3);
}

}

@keyframes spin{

from{
transform:rotate(0deg);
}

to{
transform:rotate(360deg);
}

}

@keyframes orbFloat{

0%,100%{
transform:translateY(0);
}

50%{
transform:translateY(-18px);
}

}

@keyframes blink{

50%{
opacity:1;
}

}

</style>
</head>

<body>

<div class="cursor"></div>

<div class="bg">

<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="orb orb3"></div>

<div class="glass-shape shape1"></div>
<div class="glass-shape shape2"></div>

<div class="particles" id="particles"></div>

</div>

<div class="wrapper">

<div class="phone" id="phone">

<div class="screen">

<div class="island">
<div class="island-dot"></div>
</div>

<div class="notification" id="notification">
✨ Galaxy AI готов к работе
</div>

<!-- LOCK SCREEN -->

<div class="lock-screen" id="lock">

<div class="time" id="time">
12:45
</div>

<div class="date" id="date">
Monday, June 9
</div>

<div class="weather">

<div class="weather-row">
<div class="weather-icon">☀️</div>
<div>
<div class="weather-temp">24°C</div>
<div style="opacity:.6;font-size:.8rem;">
Tallinn
</div>
</div>
</div>

</div>

<div class="ai-orb"></div>

<div class="unlock-text">
Swipe Up To Unlock
</div>

<div class="home-indicator"></div>

</div>

<!-- HOME -->

<div class="home-screen" id="home">

<div class="status">
<div>09:41</div>
<div>5G • 100%</div>
</div>

<div class="widgets">

<div class="widget ai-widget">

<div class="ai-title">
Galaxy AI
</div>

<div class="ai-sub">
Ask anything. Create anything.
</div>

</div>

</div>

<div class="apps">

<div class="app">
<div class="icon">🤖</div>
<div class="label">AI</div>
</div>

<div class="app">
<div class="icon">📷</div>
<div class="label">Camera</div>
</div>

<div class="app">
<div class="icon">💬</div>
<div class="label">Messages</div>
</div>

<div class="app">
<div class="icon">🌐</div>
<div class="label">Browser</div>
</div>

<div class="app">
<div class="icon">⚙️</div>
<div class="label">Settings</div>
</div>

<div class="app">
<div class="icon">🎵</div>
<div class="label">Music</div>
</div>

<div class="app">
<div class="icon">❤️</div>
<div class="label">Health</div>
</div>

<div class="app">
<div class="icon">☁️</div>
<div class="label">Cloud</div>
</div>

</div>

</div>

</div>

</div>

</div>

<script>

/* CURSOR */

const cursor=document.querySelector(".cursor");

let mx=0,my=0;
let cx=0,cy=0;

window.addEventListener("mousemove",e=>{
mx=e.clientX;
my=e.clientY;
});

function animateCursor(){

cx+=(mx-cx)*0.08;
cy+=(my-cy)*0.08;

cursor.style.transform=
`translate(${cx-160}px,${cy-160}px)`;

requestAnimationFrame(animateCursor);
}

animateCursor();

/* TIME */

function updateTime(){

const now=new Date();

document.getElementById("time").innerHTML=
now.toLocaleTimeString("ru-RU",{
hour:"2-digit",
minute:"2-digit"
});

document.getElementById("date").innerHTML=
now.toLocaleDateString("ru-RU",{
weekday:"long",
month:"long",
day:"numeric"
});

}

updateTime();
setInterval(updateTime,1000);

/* PARTICLES */

const particles=document.getElementById("particles");

for(let i=0;i<60;i++){

const p=document.createElement("div");

p.className="particle";

p.style.left=Math.random()*100+"%";
p.style.top=Math.random()*100+"%";

p.style.opacity=Math.random()*.5;

particles.appendChild(p);

}

/* PHONE TILT */

const phone=document.getElementById("phone");

window.addEventListener("mousemove",e=>{

const x=(e.clientX/window.innerWidth-.5)*16;
const y=(e.clientY/window.innerHeight-.5)*16;

phone.style.transform=
`rotateY(${x}deg)
 rotateX(${-y}deg)`;

});

/* UNLOCK */

const lock=document.getElementById("lock");
const home=document.getElementById("home");

let startY=0;

lock.addEventListener("touchstart",e=>{
startY=e.touches[0].clientY;
});

lock.addEventListener("touchend",e=>{

const end=e.changedTouches[0].clientY;

if(startY-end>80){

lock.style.transform=
"translateY(-100%)";

home.classList.add("active");

document
.getElementById("notification")
.classList.add("show");

}

});

document.addEventListener("keydown",e=>{

if(e.code==="Space"){

lock.style.transform=
"translateY(-100%)";

home.classList.add("active");

document
.getElementById("notification")
.classList.add("show");

}

});

</script>

</body>
</html>
